<app-table-container>
      <div class="flex items-center justify-between border-b border-gray-200 px-5 py-4 dark:border-gray-800">
        <div>
          <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">
            Transactions
          </h3>
          <p class="text-sm text-gray-500 dark:text-gray-400">
            Your most recent transactions list
          </p>
        </div>
        <div class="flex gap-3.5">
          <div class="hidden flex-col gap-3 sm:flex sm:flex-row sm:items-center">
            <div class="relative">
              <app-search-input
                className="xl:w-[300px]"
                [value]="search"
                (search)="onSearchChange(); search = $event"
              />
            </div>
            <div class="hidden lg:block relative">
              <select
                class="shadow-theme-xs bg-none appearance-none focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 pr-11 text-sm text-gray-800 placeholder:text-gray-400 focus:ring-3 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                [(ngModel)]="filterDays"
                (ngModelChange)="onFilterChange()"
              >
                <option>Last 7 Days</option>
                <option>Last 10 Days</option>
                <option>Last 15 Days</option>
                <option>Last 30 Days</option>
              </select>
              <svg
                class="absolute text-gray-700 dark:text-gray-400 right-3 top-1/2 -translate-y-1/2 pointer-events-none"
                width="20"
                height="20"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M4.79175 8.02075L10.0001 13.2291L15.2084 8.02075"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
            <div>
              <button class="shadow-theme-xs flex h-11 items-center justify-center gap-2 rounded-lg border border-gray-300 bg-white px-4 py-3 text-gray-700 hover:bg-gray-100 hover:text-gray-700 dark:border-gray-800 dark:bg-gray-900 dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-white">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 20 20"
                  fill="none"
                >
                  <path
                    d="M16.6661 13.3333V15.4166C16.6661 16.1069 16.1064 16.6666 15.4161 16.6666H4.58203C3.89168 16.6666 3.33203 16.1069 3.33203 16.6666V13.3333M10.0004 3.33325L10.0004 13.3333M6.14456 7.18708L9.9986 3.33549L13.8529 7.18708"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
                Export CSV
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="custom-scrollbar overflow-x-auto">
        <table class="w-full table-auto">
          <thead>
            <tr class="border-b border-gray-200 dark:divide-gray-800 dark:border-gray-800">
              <th class="p-4">
                <div class="flex w-full items-center gap-3">
                  <label class="flex cursor-pointer items-center text-sm font-medium text-gray-700 select-none dark:text-gray-400">
                    <span class="relative">
                      <input
                        type="checkbox"
                        class="sr-only"
                        [checked]="isAllSelected()"
                        (change)="toggleSelectAll()"
                      />
                      <span
                        class="flex h-4 w-4 items-center justify-center rounded-sm border-[1.25px]"
                        [ngClass]="{
                          'border-brand-500 bg-brand-500': isAllSelected(),
                          'bg-transparent border-gray-300 dark:border-gray-700': !isAllSelected()
                        }"
                      >
                        <span [ngClass]="{ 'opacity-0': !isAllSelected() }">
                          <svg
                            width="12"
                            height="12"
                            viewBox="0 0 12 12"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                          >
                            <path
                              d="M10 3L4.5 8.5L2 6"
                              stroke="white"
                              stroke-width="1.6666"
                              stroke-linecap="round"
                              stroke-linejoin="round"
                            />
                          </svg>
                        </span>
                      </span>
                     </span>
                    </label>
                    <p class="text-theme-xs font-medium text-gray-500 dark:text-gray-400">
                      Order ID
                    </p>
                  </div>
                </th>
                <th class="p-4 text-left text-xs font-medium text-gray-500 dark:text-gray-400">
                  <div
                    class="flex cursor-pointer items-center gap-3"
                    (click)="sortBy('customer')"
                  >
                    <p class="text-theme-xs font-medium text-gray-500 dark:text-gray-400">
                      Customer
                    </p>
                    <span class="flex flex-col gap-0.5">
                      <svg
                        class="fill-current"
                        [ngClass]="{
                          'text-gray-800 dark:text-gray-400': sort.key === 'customer' && sort.asc,
                          'text-gray-300': !(sort.key === 'customer' && sort.asc)
                        }"
                        width="8"
                        height="5"
                        viewBox="0 0 8 5"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                      >
                        <path
                          d="M4.40962 0.585167C4.21057 0.300808 3.78943 0.300807 3.59038 0.585166L1.05071 4.21327C0.81874 4.54466 1.05582 5 1.46033 5H6.53967C6.94418 5 7.18126 4.54466 6.94929 4.21327L4.40962 0.585167Z"
                          fill=""
                        />
                      </svg>
                      <svg
                        class="fill-current"
                        [ngClass]="{
                          'text-gray-800 dark:text-gray-400': sort.key === 'customer' && !sort.asc,
                          'text-gray-300': !(sort.key === 'customer' && !sort.asc)
                        }"
                        width="8"
                        height="5"
                        viewBox="0 0 8 5"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                      >
                        <path
                          d="M4.40962 4.41483C4.21057 4.69919 3.78943 4.69919 3.59038 4.41483L1.05071 0.786732C0.81874 0.455343 1.05582 0 1.46033 0H6.53967C6.94418 0 7.18126 0.455342 6.94929 0.786731L4.40962 4.41483Z"
                          fill=""
                        />
                      </svg>
                    </span>
                  </div>
                </th>
                <th class="p-4 text-left text-xs font-medium text-gray-500 dark:text-gray-400">
                  <div
                    class="flex cursor-pointer items-center gap-3"
                    (click)="sortBy('email')"
                  >
                    <p class="text-theme-xs font-medium text-gray-500 dark:text-gray-400">
                      Email
                    </p>
                    <span class="flex flex-col gap-0.5">
                      <svg
                        class="fill-current"
                        [ngClass]="{
                          'text-gray-800 dark:text-gray-400': sort.key === 'email' && sort.asc,
                          'text-gray-300': !(sort.key === 'email' && sort.asc)
                        }"
                        width="8"
                        height="5"
                        viewBox="0 0 8 5"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                      >
                        <path
                          d="M4.40962 0.585167C4.21057 0.300808 3.78943 0.300807 3.59038 0.585166L1.05071 4.21327C0.81874 4.54466 1.05582 5 1.46033 5H6.53967C6.94418 5 7.18126 4.54466 6.94929 4.21327L4.40962 0.585167Z"
                          fill=""
                        />
                      </svg>
                      <svg
                        class="fill-current"
                        [ngClass]="{
                          'text-gray-800 dark:text-gray-400': sort.key === 'email' && !sort.asc,
                          'text-gray-300': !(sort.key === 'email' && !sort.asc)
                        }"
                        width="8"
                        height="5"
                        viewBox="0 0 8 5"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                      >
                        <path
                          d="M4.40962 4.41483C4.21057 4.69919 3.78943 4.69919 3.59038 4.41483L1.05071 0.786732C0.81874 0.455343 1.05582 0 1.46033 0H6.53967C6.94418 0 7.18126 0.455342 6.94929 0.786731L4.40962 4.41483Z"
                          fill=""
                        />
                      </svg>
                    </span>
                  </div>
                </th>
                <th class="p-4 text-left text-xs font-medium text-gray-500 dark:text-gray-400">
                  <div
                    class="flex cursor-pointer items-center gap-3"
                    (click)="sortBy('amount')"
                  >
                    <p class="text-theme-xs font-medium text-gray-500 dark:text-gray-400">
                      Total Amount
                    </p>
                    <span class="flex flex-col gap-0.5">
                      <svg
                        class="fill-current"
                        [ngClass]="{
                          'text-gray-800 dark:text-gray-400': sort.key === 'amount' && sort.asc,
                          'text-gray-300': !(sort.key === 'amount' && sort.asc)
                        }"
                        width="8"
                        height="5"
                        viewBox="0 0 8 5"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                      >
                        <path
                          d="M4.40962 0.585167C4.21057 0.300808 3.78943 0.300807 3.59038 0.585166L1.05071 4.21327C0.81874 4.54466 1.05582 5 1.46033 5H6.53967C6.94418 5 7.18126 4.54466 6.94929 4.21327L4.40962 0.585167Z"
                          fill=""
                        />
                      </svg>
                      <svg
                        class="fill-current"
                        [ngClass]="{
                          'text-gray-800 dark:text-gray-400': sort.key === 'amount' && !sort.asc,
                          'text-gray-300': !(sort.key === 'amount' && !sort.asc)
                        }"
                        width="8"
                        height="5"
                        viewBox="0 0 8 5"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                      >
                        <path
                          d="M4.40962 4.41483C4.21057 4.69919 3.78943 4.69919 3.59038 4.41483L1.05071 0.786732C0.81874 0.455343 1.05582 0 1.46033 0H6.53967C6.94418 0 7.18126 0.455342 6.94929 0.786731L4.40962 4.41483Z"
                          fill=""
                        />
                      </svg>
                    </span>
                  </div>
                </th>
                <th class="p-4 text-left text-xs font-medium text-gray-500 dark:text-gray-400">
                  Due Date
                </th>
                <th class="p-4 text-left text-xs font-medium text-gray-500 dark:text-gray-400">
                  Status
                </th>
                <th class="p-4 text-left text-xs font-medium text-gray-500 dark:text-gray-400">
                  <div class="relative">
                    <span class="sr-only">Action</span>
                  </div>
                </th>
            </tr>
          </thead>
          <tbody class="divide-x divide-y divide-gray-200 dark:divide-gray-800">
            @for (row of paginatedRows; track $index) {
              <tr
                class="transition hover:bg-gray-50 dark:hover:bg-gray-900"
              >
                <td class="p-4 whitespace-nowrap">
                  <div class="group flex items-center gap-3">
                    <label class="flex cursor-pointer items-center text-sm font-medium text-gray-700 select-none dark:text-gray-400">
                      <span class="relative">
                        <input
                          type="checkbox"
                          class="sr-only"
                          [checked]="selected.includes(row.id)"
                          (change)="toggleRow(row.id)"
                        />
                        <span
                          class="flex h-4 w-4 items-center justify-center rounded-sm border-[1.25px]"
                          [ngClass]="{
                            'border-brand-500 bg-brand-500': selected.includes(row.id),
                            'bg-transparent border-gray-300 dark:border-gray-700': !selected.includes(row.id)
                          }"
                        >
                          <span [ngClass]="{ 'opacity-0': !selected.includes(row.id) }">
                            <svg
                              width="12"
                              height="12"
                              viewBox="0 0 12 12"
                              fill="none"
                              xmlns="http://www.w3.org/2000/svg"
                            >
                              <path
                                d="M10 3L4.5 8.5L2 6"
                                stroke="white"
                                stroke-width="1.6666"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                              />
                            </svg>
                          </span>
                        </span>
                      </span>
                      </label>
                      <a
                        routerLink="/single-transaction"
                        class="text-theme-xs font-medium text-gray-700 group-hover:underline dark:text-gray-400"
                      >
                        {{ row.orderId }}
                      </a>
                    </div>
                  </td>
                  <td class="p-4 whitespace-nowrap">
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-400">
                      {{ row.customer }}
                    </span>
                  </td>
                  <td class="p-4 whitespace-nowrap">
                    <p class="text-sm text-gray-500 dark:text-gray-400">
                      {{ row.email }}
                    </p>
                  </td>
                  <td class="p-4 whitespace-nowrap">
                    <p class="text-sm text-gray-700 dark:text-gray-400">
                      {{ row.amountDisplay }}
                    </p>
                  </td>
                  <td class="p-4 whitespace-nowrap">
                    <p class="text-sm text-gray-700 dark:text-gray-400">
                      {{ row.dueDate }}
                    </p>
                  </td>
                  <td class="p-4 whitespace-nowrap">
                    <span
                      class="text-theme-xs rounded-full px-2 py-0.5 font-medium"
                      [ngClass]="{
                        'bg-success-50 text-success-700 dark:bg-success-500/15 dark:text-success-500': row.status === 'Completed',
                        'bg-warning-50 text-warning-700 dark:bg-warning-500/15 dark:text-warning-500': row.status === 'Pending',
                        'bg-red-50 text-red-700 dark:bg-red-500/15 dark:text-red-500': row.status === 'Failed'
                      }"
                    >
                      {{ row.status }}
                    </span>
                  </td>
                  <td class="p-4 whitespace-nowrap">
                    <div class="relative inline-block">
                      <app-table-dropdown>
                        <div dropdown-button>
                          <button class="text-gray-400 hover:text-gray-700 dark:hover:text-gray-300">
                            <svg
                              class="fill-current"
                              width="24"
                              height="24"
                              viewBox="0 0 24 24"
                              fill="none"
                              xmlns="http://www.w3.org/2000/svg"
                            >
                              <path
                                fill-rule="evenodd"
                                clip-rule="evenodd"
                                d="M5.99902 10.245C6.96552 10.245 7.74902 11.0285 7.74902 11.995V12.005C7.74902 12.9715 6.96552 13.755 5.99902 13.755C5.03253 13.755 4.24902 12.9715 4.24902 12.005V11.995C4.24902 11.0285 5.03253 10.245 5.99902 10.245ZM17.999 10.245C18.9655 10.245 19.749 11.0285 19.749 11.995V12.005C19.749 12.9715 18.9655 13.755 17.999 13.755C17.0325 13.755 16.249 12.9715 16.249 12.005V11.995C16.249 11.0285 17.0325 10.245 17.999 10.245ZM13.749 11.995C13.749 11.0285 12.9655 10.245 11.999 10.245C11.0325 10.245 10.249 11.0285 10.249 11.995V12.005C10.249 12.9715 11.0325 13.755 11.999 13.755C12.9655 13.755 13.749 12.9715 13.749 12.005V11.995Z"
                                fill=""
                              />
                            </svg>
                          </button>
                        </div>
                        <div dropdown-content>
                          <button
                            (click)="handleViewMore()"
                            class="flex w-full font-normal text-left text-gray-500 rounded-lg hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300 p-2"
                          >
                            View More
                          </button>
                          <button
                            (click)="handleDelete()"
                            class="flex w-full font-normal text-left text-gray-500 rounded-lg hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300 p-2"
                          >
                            Delete
                          </button>
                        </div>
                      </app-table-dropdown>
                    </div>
                  </td>
                </tr>
            }
            </tbody>
          </table>
        </div>

        <app-pagination
          [currentPage]="page"
          [totalPages]="totalPages"
          [totalItems]="filteredRows.length"
          [itemsPerPage]="perPage"
          (pageChange)="goToPage($event)"
        />
      </app-table-container>
