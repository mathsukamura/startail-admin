<div class="flex items-center flex-col sm:flex-row justify-between border-t border-gray-200 px-5 py-4 dark:border-gray-800">
  @if (showInfo) {
    <div class="pb-3 sm:pb-0">
      <span class="block text-sm font-medium text-gray-500 dark:text-gray-400">
        Showing <span class="text-gray-800 dark:text-white/90">{{ startEntry }}</span> to <span class="text-gray-800 dark:text-white/90">{{ endEntry }}</span> of <span class="text-gray-800 dark:text-white/90">{{ totalItems }}</span>
      </span>
    </div>
  }
  <div class="flex w-full items-center justify-between gap-2 rounded-lg bg-gray-50 p-4 sm:w-auto sm:justify-normal sm:rounded-none sm:bg-transparent sm:p-0 dark:bg-gray-900 dark:sm:bg-transparent">
    <button
      class="shadow-theme-xs flex items-center gap-2 rounded-lg border border-gray-300 bg-white p-2 text-gray-700 hover:bg-gray-50 hover:text-gray-800 disabled:cursor-not-allowed disabled:opacity-50 sm:p-2.5 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-white/[0.03] dark:hover:text-gray-200"
      [disabled]="currentPage === 1"
      (click)="goToPage(currentPage - 1)"
    >
      <app-icon name="chevron-left-long" size="20" [fillCurrent]="true" />
    </button>
    <span class="block text-sm font-medium text-gray-700 sm:hidden dark:text-gray-400">
      Page {{ currentPage }} of {{ totalPages }}
    </span>
    <ul class="hidden items-center gap-0.5 sm:flex">
      @for (page of visiblePages; track page) {
        <li>
          <button
            (click)="goToPage(page)"
            class="flex h-10 w-10 items-center justify-center rounded-lg text-sm font-medium"
            [ngClass]="{
              'bg-brand-500 text-white': page === currentPage,
              'text-gray-700 hover:bg-brand-500 hover:text-white dark:text-gray-400 dark:hover:text-white': page !== currentPage
            }"
          >
            {{ page }}
          </button>
        </li>
      }
      @if (visiblePages[visiblePages.length - 1] < totalPages) {
        <li>
          <span class="flex h-10 w-10 items-center justify-center rounded-lg text-sm font-medium text-gray-700 dark:text-gray-400">...</span>
        </li>
        <li>
          <button
            (click)="goToPage(totalPages)"
            class="hover:bg-brand-500 flex h-10 w-10 items-center justify-center rounded-lg text-sm font-medium text-gray-700 hover:text-white dark:text-gray-400 dark:hover:text-white"
          >
            {{ totalPages }}
          </button>
        </li>
      }
    </ul>
    <button
      class="shadow-theme-xs flex items-center gap-2 rounded-lg border border-gray-300 bg-white p-2 text-gray-700 hover:bg-gray-50 hover:text-gray-800 disabled:cursor-not-allowed disabled:opacity-50 sm:p-2.5 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-white/[0.03] dark:hover:text-gray-200"
      [disabled]="currentPage === totalPages"
      (click)="goToPage(currentPage + 1)"
    >
      <app-icon name="chevron-right-long" size="20" [fillCurrent]="true" />
    </button>
  </div>
</div>
