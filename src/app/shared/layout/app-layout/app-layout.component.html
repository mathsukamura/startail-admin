<div class="flex min-h-svh w-full bg-sidebar">
  <app-sidebar></app-sidebar>
  <app-backdrop></app-backdrop>

  <div
    class="relative flex min-h-svh w-full flex-1 flex-col transition-all duration-200 ease-linear"
    [ngClass]="{
      'md:ml-64': (isExpanded$ | async) || (isHovered$ | async),
      'md:ml-12': !((isExpanded$ | async) || (isHovered$ | async))
    }"
  >
    <div class="flex flex-1 flex-col bg-background md:my-2 md:mr-2 md:rounded-xl md:shadow-sm overflow-hidden">
      <app-header></app-header>
      <main class="flex-1 px-4 py-6">
        <div class="mx-auto w-full max-w-7xl">
          <router-outlet></router-outlet>
        </div>
      </main>
    </div>
  </div>
</div>
